# Tanque (torpasgas) — db + app (migrate-on-start) + Watchtower auto-pull.
# Values come from a sibling .env on the host (NEVER commit it; see .env.example).
# Gotchas: never `docker compose down -v` (it wipes the DB volume). Watchtower
# only swaps the image — structural changes here need a manual `up -d`.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - torpasgas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/andrevieira11/torpasgas:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      WALLETA_URL: ${WALLETA_URL:-}
      WALLETA_INGEST_TOKEN: ${WALLETA_INGEST_TOKEN:-}
      NODE_ENV: production
    ports:
      - "${APP_PORT}:3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: nickfedor/watchtower
    restart: unless-stopped
    command: --label-enable --cleanup --interval 300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  torpasgas_pgdata:
